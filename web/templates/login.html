<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Service — Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-950 text-gray-100 flex items-center justify-center px-6">
    <div class="w-full max-w-sm">
        <div class="rounded-2xl border border-gray-800 bg-gray-900 p-8 shadow-2xl">
            <div class="mb-6 inline-flex rounded-full border border-blue-500/30 bg-blue-500/10 px-3 py-1 text-sm font-medium text-blue-300">
                Camera Service
            </div>
            <h1 class="text-2xl font-semibold text-white">Sign In</h1>
            <p class="mt-2 text-sm text-gray-400">Enter your administrator credentials to continue.</p>

            {{if .Error}}
            <div class="mt-5 rounded-lg border border-red-500/30 bg-red-500/10 px-4 py-3 text-sm text-red-300">
                {{.Error}}
            </div>
            {{end}}

            <form method="POST" action="/auth/login" class="mt-6 space-y-4">
                <input type="hidden" name="redirect" value="{{.Redirect}}">

                <div>
                    <label for="username" class="block text-sm font-medium text-gray-300 mb-1">Username</label>
                    <input
                        id="username"
                        name="username"
                        type="text"
                        autocomplete="username"
                        required
                        autofocus
                        class="w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-2.5 text-sm text-white placeholder-gray-500 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition"
                        placeholder="admin"
                    >
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        autocomplete="current-password"
                        required
                        class="w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-2.5 text-sm text-white placeholder-gray-500 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition"
                        placeholder="••••••••"
                    >
                </div>

                <button
                    type="submit"
                    class="mt-2 w-full rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-medium text-white hover:bg-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-gray-900 transition"
                >
                    Sign In
                </button>
            </form>
        </div>

        <p class="mt-4 text-center text-xs text-gray-600">
            External users must be granted access via the allowlist.
        </p>
    </div>
</body>
</html>
