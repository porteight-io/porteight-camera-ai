<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Access Required</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-950 text-gray-100">
    <div class="mx-auto flex min-h-screen max-w-3xl items-center px-6 py-16">
        <div class="w-full rounded-2xl border border-gray-800 bg-gray-900 p-8 shadow-2xl">
            <div class="mb-6 inline-flex rounded-full border border-blue-500/30 bg-blue-500/10 px-3 py-1 text-sm font-medium text-blue-300">
                Camera Service
            </div>
            <h1 class="text-3xl font-semibold text-white">Access Required</h1>
            <p class="mt-4 text-base text-gray-300">{{.Message}}</p>
            <div class="mt-8 rounded-xl border border-gray-800 bg-gray-950/60 p-4 text-sm text-gray-400">
                <p>Administrators can sign in directly using their credentials. External users need to be granted access via the camera allowlist by an administrator.</p>
            </div>
            <div class="mt-8 flex gap-3">
                <a href="/auth/login" class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-500">Sign In</a>
                <a href="/logout" class="rounded-lg border border-gray-700 px-4 py-2 text-sm font-medium text-gray-300 hover:border-gray-600 hover:text-white">Clear Session</a>
            </div>
        </div>
    </div>
</body>
</html>
